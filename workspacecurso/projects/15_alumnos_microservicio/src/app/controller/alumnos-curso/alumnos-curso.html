<p>alumnos-curso works!</p>
<div id="cursos" class="page">
  <h2>Alumnos por curso</h2>
  <label>Selecciona un curso:</label>
  <select id="selectCurso" (change)="mostrarAlumnos($event)">
    <option value="">Seleccione un curso</option>
    @for(c of cursos();track c){
      <option value="{{c}}">{{c}}</option>
    }
  </select>
  @if(alumnosPorCurso()){
    <table id="tablaAlumnos">
      <thead>
        <tr><th>Email</th><th>Nombre</th><th>Nota</th><th>Acción</th><th>Favorito</th></tr>
      </thead>
      <tbody>
        @for(a of alumnosPorCurso();track a){
          <tr cambioColor="grey">
            <td>{{a.email}}</td>
            <td>{{a.nombre}}</td>
            <td>{{a.nota}} - {{a.nota|calificacion}}</td>
            <td><button (click)="borrarAlumno(a.email)">&nbsp;X&nbsp;</button></td>
            @if(isFavorito(a.email)){
              <td><button (click)="delFavorito(a.email)">&nbsp;■&nbsp;</button></td>
            }@else{
              <td><button (click)="addFavorito(a)">&nbsp;□&nbsp;</button></td>
            }
          </tr>
        }
      </tbody>
    </table>
  }
</div>
