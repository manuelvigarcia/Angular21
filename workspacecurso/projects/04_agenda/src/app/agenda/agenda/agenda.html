<p>agenda works!</p>
<div class="container">
  Introduce nombre:   <input type="text" [(ngModel)]="nombre"><br>
  Introduce teléfono: <input type="text" [(ngModel)]="telefono"><br>
  Introduce Edad:     <input type="number" [(ngModel)]="edad"><br>
  <input type="button" value="guardar" (click)="guardar()"><br>
  <input type="button" value="mostrar" (click)="mostrar()"><br>
  <h1>Mi agenda</h1>
  <div>
      <table>
        <tr><th>Operación</th><th>Resultado</th>
      </table>
      @for (resultado of listaresultados;track resultado>) {
        <tr>
          <td>{{resultado.tipo}}</td>
          <td>{{resultado.valor}}</td>
        </tr>
      }
  </div>
</div>
