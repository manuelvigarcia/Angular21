<p>buscador works!</p>
<div>
  <h1>Búsqueda de items por temática</h1>
  Introduce temática:&nbsp;
  <input type="text" [ngModel]="tematica()" (ngModelChange)="tematica.set($event)"><br>
  <input type="button" value="Buscar" (click)="mostrarTematica()"><br>
  @if(resultados().length>0){
    <table border="1">
      <tr><th>URL</th><th>Tematica</th><th>Descripción</th><th>Eliminar</th></tr>
      @for(r of resultados();track r){
        <tr>
          <td><code><a href="{{r.url}}" target="_blank">{{r.url}}</a></code></td>
          <td>{{r.tematica}}</td>
          <td>{{r.descripcion}}</td>
          <td align="center"><input type="button" value="&nbsp;X&nbsp;" (click)="borrarResultado(r.url)"></td>
        </tr>
      }
    </table>
  }
  &lt;{{tematicaselecionada()}}&gt;<br>
  Tiene {{resultados().length}} elementos.
</div>
