<p>alta-controller works!</p>
<div class="container">
  <h1>Formulario para nuevos items</h1>
    Inrroduce url: <input type="text"
                      [ngModel]="resultado().url"
                      (ngModelChange)="resultado.update(c=>({ ...c, url: $event }))"
                  ><br>
    Introduce temática: <input type="text"
                  [(ngModel)]="resultado().tematica"
                  (ngModelChange)="resultado.update(c=>({ ...c, tematica: $event }))"
                  ><br>
    Introduce descripción <input type="text"
                    [(ngModel)]="resultado().descripcion"
                    (ngModelChange)="resultado.update(c=>({ ...c, descripcion: $event }))"
                    ><br>
    <input type="button" value="Guardar" (click)="guardar()"><br>


</div>
