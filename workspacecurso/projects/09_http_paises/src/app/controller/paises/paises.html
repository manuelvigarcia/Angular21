<p>paises works!</p>
<br>
<div>
  <div>
    Selecciona un continente&nbsp;
    <select [(ngModel)]="selectedcontinent" (ngModelChange)="selectedcontinent.set($event)" (change)="paisesDeContinente()">
      @for(region of listacontinentes();track region){
        <option value="{{region}}">{{region}}</option>
      }
    </select>
    <hr>

    <hr>
    @if(listapaises().length>0){
      <table border="1" width="100%">
        <tr>
          <th>Nombre país</th>
          <th width=125>Continente</th>
          <th width=90>Población</th>
          <th width=70>Bandera</th>
        </tr>
        @for(p of listapaises();track p){
          <tr>
            <td>{{p.name}}</td>
            <td>{{p.region}}</td>
            <td align="right">{{p.population}}</td>
            <td align="center"><img src={{p.flags.svg}} height="25"></td>
          </tr>
        }

      </table>
    }
  </div>
</div>
